services:
  # 볼륨 초기화 및 설정 복사 (최초 1회 자동 실행)
  init-permissions:
    build: ./openclaw
    container_name: openclaw-init
    user: root
    entrypoint:
      - sh
      - -c
      - |
        mkdir -p /data/.openclaw
        cp /seed/openclaw.json /data/.openclaw/openclaw.json
        chown -R openclaw:openclaw /data
        echo 'init done'
    volumes:
      - openclaw-data:/data
      - ./openclaw/openclaw-config.json:/seed/openclaw.json:ro

  openclaw-gateway:
    build: ./openclaw
    container_name: openclaw-gateway
    restart: unless-stopped
    depends_on:
      init-permissions:
        condition: service_completed_successfully
    command: ["gateway", "--bind", "lan", "--port", "18789", "--allow-unconfigured"]
    environment:
      - OPENCLAW_HOME=/data
      - OPENCLAW_STATE_DIR=/data/.openclaw
      - OPENCLAW_CONFIG_PATH=/data/.openclaw/config.yaml
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    tmpfs: ["/tmp"]
    volumes:
      - openclaw-data:/data
    ports:
      - "18789:18789"

volumes:
  openclaw-data:
