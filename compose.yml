services:
  # 볼륨 초기화 및 설정/메모리 동기화 (최초 1회 및 재시작 시 자동 실행)
  init-permissions:
    build: ./openclaw
    container_name: openclaw-init
    user: root
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - TELEGRAM_ADMIN_ID=${TELEGRAM_ADMIN_ID}
      - MEMORY_REPO_URL=${MEMORY_REPO_URL:-https://github.com/insublee/Insub-Bot-Memory}
    entrypoint:
      - sh
      - -c
      - |
        set -x
        # 1. 설정 폴더 준비
        mkdir -p /data/.openclaw/credentials
        cp /seed/openclaw.json /data/.openclaw/openclaw.json

        # 2. config.yaml 자동 생성
        printf '{
          "auth": {
            "profiles": {
              "google:default": {
                "provider": "google",
                "mode": "api_key"
              }
            }
          },
          "agents": {
            "defaults": {
              "workspace": "/data/Insub-Bot-Memory",
              "model": {
                "primary": "google/gemini-3-flash-preview"
              },
              "memorySearch": {
                "enabled": true
              }
            }
          },
          "channels": {
            "telegram": {
              "enabled": true,
              "botToken": "%s",
              "dmPolicy": "pairing",
              "groups": { "*": { "requireMention": true } }
            }
          },
          "gateway": {
            "controlUi": {
              "dangerouslyAllowHostHeaderOriginFallback": true
            }
          }
        }' "${TELEGRAM_BOT_TOKEN}" > /data/.openclaw/config.yaml

        # 2b. 텔레그램 페어링 자동 주입
        if [ -n "${TELEGRAM_ADMIN_ID}" ] && [ "${TELEGRAM_ADMIN_ID}" != "null" ]; then
          printf '{"version":1,"allowFrom":["%s"]}' "${TELEGRAM_ADMIN_ID}" > /data/.openclaw/credentials/telegram-default-allowFrom.json
          echo '{"version":1,"requests":[]}' > /data/.openclaw/credentials/telegram-pairing.json
        fi

        # 3. 메모리 레포 동기화 (Insub-Bot-Memory)
        # GITHUB_TOKEN이 있으면 URL에 삽입 (Compose에서 직접 처리)
        if [ ! -d "/data/Insub-Bot-Memory/.git" ]; then
          echo "Cloning memory repo..."
          git clone "https://${GITHUB_TOKEN:+$GITHUB_TOKEN@}github.com/insublee/Insub-Bot-Memory" /data/Insub-Bot-Memory
        else
          echo "Syncing memory repo..."
          cd /data/Insub-Bot-Memory && git pull "https://${GITHUB_TOKEN:+$GITHUB_TOKEN@}github.com/insublee/Insub-Bot-Memory"
        fi

        # node:node (UID/GID 1000) 유저가 기본으로 존재함
        chown -R 1000:1000 /data
        echo 'init done'
    volumes:
      - openclaw-data:/data
      - ./openclaw/openclaw-config.json:/seed/openclaw.json:ro

  openclaw-gateway:
    build: ./openclaw
    container_name: openclaw-gateway
    restart: unless-stopped
    depends_on:
      init-permissions:
        condition: service_completed_successfully
    command: ["gateway", "--bind", "lan", "--port", "18789", "--allow-unconfigured"]
    environment:
      - OPENCLAW_HOME=/data
      - OPENCLAW_STATE_DIR=/data/.openclaw
      - OPENCLAW_CONFIG_PATH=/data/.openclaw/config.yaml
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - NOTION_API_KEY=${NOTION_API_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    user: root
    tmpfs: ["/tmp"]
    volumes:
      - openclaw-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "18789:18789"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:18789/health", "||", "exit", "0"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # 이미지 자동 업데이트 (매일 새벽 4시)
  watchtower:
    image: containrrr/watchtower
    container_name: openclaw-watchtower
    restart: unless-stopped
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=86400
      - WATCHTOWER_SCHEDULE=0 0 4 * * *
      - TZ=Asia/Seoul
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "2"

volumes:
  openclaw-data:
