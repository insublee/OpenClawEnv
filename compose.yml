services:
  # 볼륨 초기화 및 설정 복사 (최초 1회 자동 실행)
  init-permissions:
    build: ./openclaw
    container_name: openclaw-init
    user: root
    entrypoint:
      - sh
      - -c
      - |
        mkdir -p /data/.openclaw
        cp /seed/openclaw.json /data/.openclaw/openclaw.json
        chown -R openclaw:openclaw /data
        echo 'init done'
    volumes:
      - openclaw-data:/data
      - ./openclaw/openclaw-config.json:/seed/openclaw.json:ro

  openclaw-gateway:
    build: ./openclaw
    container_name: openclaw-gateway
    restart: unless-stopped
    depends_on:
      init-permissions:
        condition: service_completed_successfully
    command: ["gateway", "--bind", "lan", "--port", "18789", "--allow-unconfigured"]
    environment:
      - OPENCLAW_HOME=/data
      - OPENCLAW_STATE_DIR=/data/.openclaw
      - OPENCLAW_CONFIG_PATH=/data/.openclaw/config.yaml
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - NOTION_API_KEY=${NOTION_API_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    tmpfs: ["/tmp"]
    volumes:
      - openclaw-data:/data
    ports:
      - "18789:18789"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:18789/health", "||", "exit", "0"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # ── 서버 전용: 이미지 자동 업데이트 ──
  watchtower:
    image: containrrr/watchtower
    container_name: openclaw-watchtower
    restart: unless-stopped
    profiles: ["server"]
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=86400
      - WATCHTOWER_SCHEDULE=0 0 4 * * *
      - TZ=Asia/Seoul
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "2"

volumes:
  openclaw-data:
