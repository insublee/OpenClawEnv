services:
  openclaw-gateway:
    build: ./openclaw
    container_name: openclaw-gateway
    restart: unless-stopped
    command: ["gateway", "--bind", "loopback", "--port", "18789", "--allow-unconfigured"]
    environment:
      - OPENCLAW_HOME=/data/.openclaw
      - OPENCLAW_STATE_DIR=/data/.openclaw
      - OPENCLAW_CONFIG_PATH=/data/.openclaw/config.yaml
      - OPENAI_BASE_URL=http://litellm:4000/v1
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LITELLM_API_KEY=${LITELLM_MASTER_KEY}
    read_only: true
    tmpfs: ["/tmp"]
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    volumes:
      - openclaw-data:/data
      - ./openclaw/openclaw-config.json:/data/.openclaw/openclaw.json:ro
    networks: [llm-backend]
    # 디버깅 필요하면 잠깐만 열기
    # ports:
    #   - "127.0.0.1:18789:18789"

networks:
  llm-backend:
    external: true

volumes:
  openclaw-data: