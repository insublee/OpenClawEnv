services:
  openclaw:
    # TODO: 네 OpenClaw 이미지/빌드로 교체
    # image: your-openclaw-image:latest
    # 또는
    # build: ./openclaw
    container_name: openclaw
    restart: unless-stopped

    environment:
      - OPENAI_BASE_URL=http://litellm:4000/v1
      - OPENAI_API_KEY=${OPENAI_API_KEY}

    # ✅ 샌드박스 하드닝(추천 기본)
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    volumes:
      - openclaw-data:/data

    networks: [llm-backend]

networks:
  llm-backend:
    external: true

volumes:
  openclaw-data: