services:
  openclaw:
    build: ./openclaw
    container_name: openclaw
    restart: unless-stopped
    environment:
      # OpenAI compatible gateway (LiteLLM)
      - OPENAI_BASE_URL=http://litellm:4000/v1
      - OPENAI_API_KEY=${OPENAI_API_KEY}

      # (권장) OpenClaw가 모델명을 env로 받는다면 여기서 고정
      # - OPENAI_MODEL=local-qwen32

    # ✅ 샌드박스 하드닝
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - openclaw-data:/data
    networks:
      - llm-backend

networks:
  llm-backend:
    external: true

volumes:
  openclaw-data: