services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    volumes:
      - ollama:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks: [llm-backend]

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:4000"
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    command: ["--config", "/app/config.yaml"]
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    # ✅ OpenClaw만 붙을 거면 호스트에 포트 열 필요 없음
    # 디버깅 때만 임시로 열어도 됨:
    # ports:
    #   - "127.0.0.1:4000:4000"
    depends_on:
      - ollama
    networks: [llm-backend]

networks:
  llm-backend:
    external: true

volumes:
  ollama: