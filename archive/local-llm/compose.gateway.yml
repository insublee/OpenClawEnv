services:
  sglang:
    build:
      context: .
      dockerfile: sglang/Dockerfile
    image: sglang-cu126-vllmops:local
    container_name: sglang
    restart: unless-stopped
    gpus: all
    volumes:
      - hf-cache:/root/.cache/huggingface
    command:
      - python3
      - -m
      - sglang.launch_server
      - --host
      - 0.0.0.0
      - --port
      - "30000"
      - --model-path
      - Qwen/Qwen2.5-14B-Instruct-GPTQ-Int4
      - --quantization
      - gptq
      # 안정적으로 먼저 띄우자 (너무 욕심내면 또 VRAM 터짐)
      - --dtype
      - float16
      - --context-length
      - "32768"
      - --max-prefill-tokens
      - "16384"
      - --chunked-prefill-size
      - "8192"
      - --tool-call-parser
      - qwen25
    networks: [llm-backend]
    # (선택) 호스트에서 직접 SGLang API 테스트하고 싶을 때만 오픈
    # ports:
    #   - "127.0.0.1:30000:30000"

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:4000"
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    command: ["--config", "/app/config.yaml"]
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    depends_on:
      - sglang
    networks: [llm-backend]

networks:
  llm-backend:
    external: true

volumes:
  hf-cache: